version: '{branch}-{build}'
skip_non_tags: true
platform:
- x86
- x64
init:
- cmd: IF %APPVEYOR_REPO_TAG%==true appveyor UpdateBuild -Version %APPVEYOR_REPO_TAG_NAME%-%APPVEYOR_BUILD_NUMBER%
before_build:
- cmd: >-
    appveyor DownloadFile http://tjaberg.com/fdf%APPVEYOR_REPO_TAG_NAME:.=%.zip

    7z x *.zip

    DEL *.zip
build_script:
- cmd: build.bat
after_build:
- cmd: 7z a fdf-%Platform%.zip *.exe
artifacts:
- path: '*.zip'
  name: fdf
deploy:
- provider: GitHub
  tag: $(APPVEYOR_REPO_TAG_NAME)
  auth_token:
    secure: cCTw0uKSiGBlY48ziH2QzmKm3M+O9UgDbx19+SWvmovZg/eqYf3DxjGZT4hEafu1
  artifact: /.*\.zip/
  on:
    APPVEYOR_REPO_TAG: true
